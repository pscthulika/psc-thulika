{% extends 'quiz/base.html' %}

{% block content %}
<div class="col-md-8 mx-auto shadow rounded p-4">
    <h3 class="mb-4">Add Question to "{{ quiz.title }}"</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Question Text</label>
            <textarea name="question_text" class="form-control" rows="2" required></textarea>
        </div>

        <h5>Options</h5>
        <div id="options-container">
            <div class="mb-2 input-group">
                <input type="text" name="options[]" class="form-control" placeholder="Option 1" required>
                <input type="radio" name="correct_option" value="0" class="ms-2" title="Mark as correct">
            </div>
            <div class="mb-2 input-group">
                <input type="text" name="options[]" class="form-control" placeholder="Option 2" required>
                <input type="radio" name="correct_option" value="1" class="ms-2" title="Mark as correct">
            </div>
        </div>

        <button type="button" class="btn btn-secondary mb-3" onclick="addOption()">+ Add Option</button>
        <button type="submit" class="btn btn-success w-100">Save Question</button>
    </form>

    <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary mt-3 w-100">Back to Dashboard</a>
</div>

<script>
let optionCount = 2;

function addOption() {
    const container = document.getElementById('options-container');
    const div = document.createElement('div');
    div.className = 'mb-2 input-group';

    const input = document.createElement('input');
    input.type = 'text';
    input.name = 'options[]';
    input.className = 'form-control';
    input.placeholder = `Option ${optionCount + 1}`;
    input.required = true;

    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = 'correct_option';
    radio.value = optionCount;
    radio.className = 'ms-2';
    radio.title = "Mark as correct";

    div.appendChild(input);
    div.appendChild(radio);

    container.appendChild(div);
    optionCount++;
}
</script>
{% endblock %}
