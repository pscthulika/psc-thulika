{% extends 'quiz/base.html' %}

{% block content %}
<div class="container my-5">
    <h2 class="text-center mb-5">Available Quizzes</h2>

    <div class="row">
        {% for quiz in quizzes %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ quiz.title }}</h5>
                        <p class="card-text text-truncate" style="max-height: 4.5em;">
                            {{ quiz.description }}
                        </p>

                        <div class="mt-auto">
                            <a href="{% url 'enter_name' quiz.id %}" 
                               class="btn btn-primary w-100 mb-2">
                               Start Quiz
                            </a>
                            <a href="{% url 'leaderboard' quiz.id %}" 
                               class="btn btn-outline-secondary w-100">
                               View Leaderboard
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        {% empty %}
            <p class="text-center">No quizzes available at the moment.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
